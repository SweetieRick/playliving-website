<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayLiving Discord</title>
    <meta name="title" content="Join the PlayLiving Discord">
    <meta name="description" content="Click here to connect with the community and join our game servers">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://playliving.lol/">
    <meta property="og:title" content="Join the PlayLiving Discord">
    <meta property="og:description"
        content="Welcome to The Living Room 🛋 — a spot for gaming, football, and whatever else is worth talking about. Come hang out, chill, and join the chaos">
    <meta property="og:image"
        content="https://cdn.discordapp.com/icons/1412007729207185502/6cb8ec67ee5708c98d139ada0d2d6605.png?size=4096">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://playliving.lol/">
    <meta property="twitter:title" content="Join the PlayLiving Discord">
    <meta property="twitter:description"
        content="Welcome to The Living Room 🛋 — a spot for gaming, football, and whatever else is worth talking about. Come hang out, chill, and join the chaos">
    <meta property="twitter:image"
        content="https://cdn.discordapp.com/icons/1183011384918749184/a_6c6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f.png">

    <meta name="theme-color" content="#5865F2">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/painting.css">
    <link rel="stylesheet" href="css/lamp.css">
    <link rel="stylesheet" href="css/couch.css">
</head>

<body>
    <nav class="navbar" id="mainNavbar">
        <div class="nav-links">
            <a href="/" class="nav-item home-btn" title="Home">
                <svg viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
            </a>
            <a href="/files/" class="nav-item folder-btn" title="Files">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
                </svg>
            </a>
            <a href="https://github.com/SweetieRick" class="nav-item github-btn" title="GitHub" target="_blank">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </a>
        </div>
        <button class="toggle-btn" onclick="toggleNavbar()">
            <svg id="arrowIcon" viewBox="0 0 24 24">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
            </svg>
        </button>
    </nav>

    <div class="container">
        <div class="header-row">
            <h1>The Living<br>Room</h1>

            <!-- Wall Painting with Discord icon -->
            <div class="wall-painting">
                <div class="painting-inner">
                    <img src="https://cdn.discordapp.com/icons/1412007729207185502/6cb8ec67ee5708c98d139ada0d2d6605.png?size=256"
                        alt="Community">
                </div>
            </div>
        </div>

        <div class="couch-scene">
            <!-- Ambient light glow -->
            <div class="lamp-ambient"></div>

            <!-- Floor Lamp SVG -->
            <svg class="floor-lamp" viewBox="0 0 100 260" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="lampPole" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#4a4a4a" />
                        <stop offset="50%" stop-color="#6a6a6a" />
                        <stop offset="100%" stop-color="#3a3a3a" />
                    </linearGradient>
                    <linearGradient id="lampShade" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#f5e6d3" />
                        <stop offset="100%" stop-color="#d4c4a8" />
                    </linearGradient>
                    <linearGradient id="lampShadeInner" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#fff8e7" />
                        <stop offset="100%" stop-color="#ffe4b3" />
                    </linearGradient>
                    <radialGradient id="bulbGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fff8e0" />
                        <stop offset="60%" stop-color="#ffc864" />
                        <stop offset="100%" stop-color="#ff9500" stop-opacity="0" />
                    </radialGradient>
                    <filter id="lampBlur" x="-100%" y="-100%" width="300%" height="300%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
                    </filter>
                </defs>

                <!-- Base -->
                <ellipse cx="50" cy="255" rx="25" ry="6" fill="#3a3a3a" />
                <ellipse cx="50" cy="252" rx="22" ry="5" fill="#5a5a5a" />

                <!-- Pole -->
                <rect x="46" y="70" width="8" height="185" fill="url(#lampPole)" />
                <rect x="44" y="245" width="12" height="10" rx="2" fill="#4a4a4a" />

                <!-- Light cone (subtle glow on floor) -->
                <ellipse class="lamp-light-cone" cx="50" cy="250" rx="40" ry="10" fill="rgba(255, 200, 100, 0.2)"
                    filter="url(#lampBlur)" />

                <!-- Lamp shade outer -->
                <path d="M25 70 L35 15 L65 15 L75 70 Z" fill="url(#lampShade)" stroke="#b8a88a" stroke-width="1" />

                <!-- Lamp shade inner glow -->
                <path d="M30 65 L37 20 L63 20 L70 65 Z" fill="url(#lampShadeInner)" opacity="0.7" />

                <!-- Shade rim -->
                <ellipse cx="50" cy="70" rx="25" ry="5" fill="#d4c4a8" stroke="#b8a88a" stroke-width="1" />
                <ellipse cx="50" cy="15" rx="15" ry="3" fill="#d4c4a8" stroke="#b8a88a" stroke-width="1" />

                <!-- Bulb glow -->
                <ellipse class="lamp-glow" cx="50" cy="55" rx="30" ry="25" fill="url(#bulbGlow)" filter="url(#lampBlur)"
                    opacity="0.9" />

                <!-- Light rays coming from shade -->
                <g class="lamp-glow" opacity="0.4">
                    <line x1="30" y1="68" x2="15" y2="85" stroke="#ffc864" stroke-width="2" stroke-linecap="round" />
                    <line x1="70" y1="68" x2="85" y2="85" stroke="#ffc864" stroke-width="2" stroke-linecap="round" />
                    <line x1="25" y1="70" x2="5" y2="100" stroke="#ffc864" stroke-width="1.5" stroke-linecap="round" />
                    <line x1="75" y1="70" x2="95" y2="100" stroke="#ffc864" stroke-width="1.5" stroke-linecap="round" />
                </g>
            </svg>

            <!-- Cozy Couch SVG -->
            <svg class="couch-svg" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
                <!-- Floor shadow -->
                <ellipse cx="200" cy="210" rx="180" ry="12" fill="rgba(0,0,0,0.3)" filter="url(#blur)" />

                <defs>
                    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
                    </filter>
                    <linearGradient id="couchBase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#8B5A3A" />
                        <stop offset="100%" stop-color="#5D3A28" />
                    </linearGradient>
                    <linearGradient id="cushionTop" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#C4956A" />
                        <stop offset="50%" stop-color="#A67B52" />
                        <stop offset="100%" stop-color="#8B5A3A" />
                    </linearGradient>
                    <linearGradient id="armrest" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#9D6B4A" />
                        <stop offset="100%" stop-color="#6B4530" />
                    </linearGradient>
                    <linearGradient id="backCushion" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" stop-color="#8B5A3A" />
                        <stop offset="50%" stop-color="#A67B52" />
                        <stop offset="100%" stop-color="#C4956A" />
                    </linearGradient>
                </defs>

                <!-- Couch back -->
                <path d="M40 60 Q45 30 80 25 L320 25 Q355 30 360 60 L360 100 Q355 110 340 115 L60 115 Q45 110 40 100 Z"
                    fill="url(#backCushion)" stroke="#6B4530" stroke-width="2" />

                <!-- Back cushion details (stitching) -->
                <path d="M100 35 Q105 70 100 105" stroke="#7D5038" stroke-width="2" fill="none"
                    stroke-linecap="round" />
                <path d="M200 30 Q205 70 200 110" stroke="#7D5038" stroke-width="2" fill="none"
                    stroke-linecap="round" />
                <path d="M300 35 Q305 70 300 105" stroke="#7D5038" stroke-width="2" fill="none"
                    stroke-linecap="round" />

                <!-- Main couch base -->
                <rect x="30" y="100" width="340" height="70" rx="8" ry="8" fill="url(#couchBase)" stroke="#5D3A28"
                    stroke-width="2" />

                <!-- Seat cushion -->
                <path
                    d="M55 105 Q50 100 55 95 L345 95 Q350 100 345 105 L345 145 Q340 155 320 158 L80 158 Q60 155 55 145 Z"
                    fill="url(#cushionTop)" stroke="#8B5A3A" stroke-width="1" />

                <!-- Cushion indent (where button sits) -->
                <ellipse cx="200" cy="130" rx="70" ry="15" fill="rgba(107,69,48,0.3)" />

                <!-- Seat cushion stitching -->
                <path d="M130 100 Q135 130 130 155" stroke="#7D5038" stroke-width="2" fill="none"
                    stroke-linecap="round" />
                <path d="M270 100 Q275 130 270 155" stroke="#7D5038" stroke-width="2" fill="none"
                    stroke-linecap="round" />

                <!-- Left armrest -->
                <path
                    d="M20 55 Q15 50 20 40 L40 35 Q55 35 60 45 L60 160 Q55 175 40 180 L25 180 Q15 175 15 160 L15 65 Q15 55 20 55 Z"
                    fill="url(#armrest)" stroke="#5D3A28" stroke-width="2" />

                <!-- Right armrest -->
                <path
                    d="M380 55 Q385 50 380 40 L360 35 Q345 35 340 45 L340 160 Q345 175 360 180 L375 180 Q385 175 385 160 L385 65 Q385 55 380 55 Z"
                    fill="url(#armrest)" stroke="#5D3A28" stroke-width="2" />

                <!-- Armrest highlights -->
                <path d="M25 50 Q30 45 35 50" stroke="#B8896A" stroke-width="2" fill="none" stroke-linecap="round" />
                <path d="M365 50 Q370 45 375 50" stroke="#B8896A" stroke-width="2" fill="none" stroke-linecap="round" />

                <!-- Couch legs -->
                <rect x="50" y="170" width="20" height="25" rx="4" fill="#4A3020" />
                <rect x="330" y="170" width="20" height="25" rx="4" fill="#4A3020" />

                <!-- Decorative pillows (optional cute detail) -->
                <ellipse cx="75" cy="85" rx="25" ry="30" fill="#D4A574" stroke="#B8896A" stroke-width="1.5"
                    transform="rotate(-15 75 85)" />
                <ellipse cx="325" cy="85" rx="25" ry="30" fill="#D4A574" stroke="#B8896A" stroke-width="1.5"
                    transform="rotate(15 325 85)" />

                <!-- Pillow details -->
                <path d="M65 70 Q75 85 65 100" stroke="#C4956A" stroke-width="1.5" fill="none" />
                <path d="M335 70 Q325 85 335 100" stroke="#C4956A" stroke-width="1.5" fill="none" />
            </svg>

            <!-- Discord button sitting on couch -->
            <div class="button-wrapper">
                <div class="button-shadow"></div>
                <a href="https://discord.gg/umaADedbBm" class="discord-button">
                    <svg class="discord-logo" viewBox="0 0 127.14 96.36">
                        <path
                            d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.25,16.15,77.7,77.7,0,0,0,7.37-12,67.48,67.48,0,0,1-11.75-5.63c.97-.7,1.94-1.44,2.87-2.21a74.14,74.14,0,0,0,64.78,0c.93.77,1.9,1.51,2.87,2.21a67.4,67.4,0,0,1-11.75,5.63,77.91,77.91,0,0,0,7.37,12,105.9,105.9,0,0,0,32.29-16.15C129.5,50.55,125.83,26.89,117.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.07,65.69,84.69,65.69Z" />
                    </svg>
                    Join the Discord
                </a>
            </div>
        </div>
    </div>
    <script>
        function toggleNavbar() {
            document.getElementById('mainNavbar').classList.toggle('collapsed');
        }
    </script>
</body>

</html>
